<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Request attended access to a DeskRTC host session.">
  <title>DeskRTC Viewer</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/socket.io/socket.io.js" defer></script>
  <script src="/viewer.js" defer></script>
</head>
<body>
  <main class="shell viewer-shell">
    <section class="card controls">
      <p class="eyebrow">Viewer mode — host approval required</p>
      <h1>Request access to a host</h1>
      <div class="row three-columns">
        <label for="viewerLabel">Viewer label <input id="viewerLabel" maxlength="80" value="Support viewer" autocomplete="name"></label>
        <label for="hostId">Session ID <input id="hostId" inputmode="numeric" placeholder="123456789" maxlength="12" autocomplete="off"></label>
        <label for="pin">PIN <input id="pin" inputmode="numeric" placeholder="6+ digits" maxlength="32" autocomplete="off"></label>
      </div>
      <div class="actions">
        <button id="connectBtn" class="button" type="button">Verify PIN and request access</button>
        <button id="disconnectBtn" class="button danger" type="button" disabled>Disconnect</button>
        <a class="button ghost" href="/">Home</a>
      </div>
      <div id="permissions" class="permission-summary" aria-live="polite">No permissions granted.</div>
      <pre id="status" aria-live="polite">Idle</pre>
    </section>

    <section class="card screen-card">
      <video id="remoteVideo" autoplay playsinline tabindex="0" aria-label="Approved remote screen stream"></video>
      <p class="hint">Input is sent only while this video is focused and only for capabilities the host approved. The host can revoke access at any time.</p>
      <div class="clipboard-row">
        <label for="clipboardText">Clipboard text <input id="clipboardText" maxlength="4096" disabled></label>
        <button id="clipboardBtn" class="button secondary" type="button" disabled>Send approved clipboard text</button>
      </div>
    </section>
  </main>
</body>
</html>
