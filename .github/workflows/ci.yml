name: DeskRTC security and tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Node dependencies without lifecycle scripts
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Verify JavaScript and security contracts
        run: npm run check
      - name: Compile Python agent source
        run: python -m py_compile host-agent.py
